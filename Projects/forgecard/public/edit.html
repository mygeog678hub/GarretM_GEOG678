<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Edit ForgeCard</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="container">

    <h1>Edit Card</h1>

    <form id="editForm">

      <input
        type="text"
        id="name"
        placeholder="Name"
      />

      <input
        type="text"
        id="company"
        placeholder="Company"
      />

      <input
        type="text"
        id="username"
        placeholder="Username"
      />

      <input
        type="text"
        id="phone"
        placeholder="Phone"
      />

      <input
        type="email"
        id="email"
        placeholder="Email"
      />

      <input
        type="text"
        id="website"
        placeholder="Website"
      />

      <input
        type="text"
        id="photo"
        placeholder="Photo URL"
      />
      <label>Select Theme</label>

<select id="theme">

  <option value="ocean">
    Ocean Blue
  </option>

  <option value="midnight">
    Midnight
  </option>

  <option value="emerald">
    Emerald
  </option>

  <option value="sunset">
    Sunset
  </option>

  <option value="minimal">
    Minimal Light
  </option>

</select>

      <button type="submit">
        Save Changes
      </button>

    </form>

  </div>

  <script type="module" src="edit.js"></script>

</body>
</html>
