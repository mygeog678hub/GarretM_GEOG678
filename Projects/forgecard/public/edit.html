<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Edit Card</title>

  <link rel="stylesheet" href="style.css" />
  

</head>

<body>

  <div class="container">

    <h1>Edit Your Card</h1>

    <form id="editForm">

      <input
        type="text"
        id="name"
        placeholder="Full Name"
      />

      <input
        type="text"
        id="username"
        placeholder="Username"
      />

      <input
        type="text"
        id="company"
        placeholder="Company"
      />

      <input
        type="text"
        id="title"
        placeholder="Job Title"
      />

      <input
        type="email"
        id="email"
        placeholder="Email"
      />

      <input
        type="tel"
        id="phone"
        placeholder="Phone"
      />

      <input
        type="text"
        id="website"
        placeholder="Website"
      />

      <input
        type="text"
        id="photo"
        placeholder="Profile Image URL"
      />

      <button type="submit">
        Save Changes
      </button>

    </form>

  </div>

  <script type="module" src="edit.js"></script>

</body>
</html>
