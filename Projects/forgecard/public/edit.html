<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>ForgeCard, Professional QR Business Cards</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="container">

    <h1>Edit Card</h1>

    <form id="editForm">

      <input
        type="text"
        id="name"
        placeholder="Name"
      />

      <input
        type="text"
        id="company"
        placeholder="Company"
      />

      <input
        type="text"
        id="username"
        placeholder="Username"
      />

      <input
        type="text"
        id="phone"
        placeholder="Phone"
      />

      <input
        type="email"
        id="email"
        placeholder="Email"
      />

      <input
        type="text"
        id="website"
        placeholder="Website"
      />

      <label>Profile Photo</label>

<input
  type="file"
  id="photo"
  accept="image/*"
/>
    <label>Select Theme</label>

<select id="theme">

  <option value="theme-ocean">
    Ocean Blue
  </option>

  <option value="theme-midnight">
    Midnight
  </option>

  <option value="theme-emerald">
    Emerald
  </option>

  <option value="theme-sunset">
    Sunset
  </option>

  <option value="theme-minimal-light">
    Minimal Light
  </option>

</select>

      <div class="edit-actions">

  <button type="submit" class="btn">
    Save Changes
  </button>

  <button
    type="button"
    id="cancelEditBtn"
    class="btn secondary-btn"
  >
    Cancel
  </button>

  <a
    href="dashboard.html"
    class="btn secondary-btn"
  >
    Return to Dashboard
  </a>

</div>

    </form>

  </div>

  <script type="module" src="edit.js"></script>

</body>
</html>
