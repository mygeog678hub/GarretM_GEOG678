<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <input
  type="text"
  id="photo"
  placeholder="Profile Image URL"
/>

  <title>Create Your Card</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>Create Your QR Business Card</h1>

    <form id="cardForm">

      <input
        type="text"
        id="name"
        placeholder="Full Name"
        required
      />
      <input
        type="text"
        id="username"
        placeholder="Custom Username"
        required
      />

      <input
        type="text"
        id="company"
        placeholder="Company"
      />

      <input
        type="text"
        id="title"
        placeholder="Job Title"
      />

      <input
        type="email"
        id="email"
        placeholder="Email Address"
      />

      <input
        type="tel"
        id="phone"
        placeholder="Phone Number"
      />

      <input
        type="text"
        id="website"
        placeholder="Website"
      />

      <button type="submit">
        Generate Card
      </button>

    </form>

  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
