<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" /> 

 <title>
    ForgeCard | Digital Business Cards with QR Codes
  </title>

  <link rel="stylesheet" href="style.css" />
</head>


<body>

  <div class="create-container">

  <div class="form-panel">

    <h2>Create Your Forgecard</h2>

    <form id="cardForm">

      <input
        type="text"
        id="name"
        placeholder="Full Name"
      >
      <input
        type="text"
        id="title"
        placeholder="Job Title"
      >
      <input
        type="text"
        id="company"
        placeholder="Company"
      >
      <input
        type="email"
        id="email"
        placeholder="Email"
      >
      <input
        type="tel"
        id="phone"
        placeholder="Phone Number"
      >  

      <div class="form-group">
  <label>Facebook URL</label>
  <input
    type="url"
    id="facebook"
    placeholder="https://facebook.com/username"
  />
</div>

<div class="form-group">
  <label>Instagram URL</label>
  <input
    type="url"
    id="instagram"
    placeholder="https://instagram.com/username"
  />
</div>

<div class="form-group">
  <label>LinkedIn URL</label>
  <input
    type="url"
    id="linkedin"
    placeholder="https://linkedin.com/in/username"
  />
</div>

<div class="form-group">
  <label>X / Twitter URL</label>
  <input
    type="url"
    id="twitter"
    placeholder="https://x.com/username"
  />
</div>
      <input
        type="text"
        id="username"
        placeholder="Social Media Username (e.g. @username)"
      />

      <input
        type="url"
        id="website"
        placeholder="Website"
      />      

      <select id="theme">

  <option value="theme-ocean">
    Ocean Blue
  </option>

  <option value="theme-midnight">
    Midnight
  </option>

  <option value="theme-emerald">
    Emerald
  </option>

  <option value="theme-sunset">
    Sunset
  </option>

  <option value="theme-minimal-light">
    Minimal Light
  </option>

</select>
      <input
      type="file"
      id="photo"
      accept="image/*"
      />

      <button type="submit">
        Generate Card
      </button>

    </form>

  </div>

  <div class="preview-panel">

    <div class="preview-card theme-ocean">

      <h3 id="previewName">
        Your Name
      </h3>

      <p id="previewTitle">
        Job Title
      </p>

      <p id="previewCompany">
        Company Name
      </p>

      <div class="preview-divider"></div>

      <p id="previewEmail">
        your@email.com
      </p>

      <p id="previewPhone">
        (000) 000-0000
      </p>

      <div class="qr-placeholder">
        QR CODE
      </div>

    </div>

  </div>

</div>

  <script type="module" src="app.js"></script>
  <script>

const fields = [
  "name",
  "title",
  "company",
  "email",
  "phone"
];

fields.forEach(field => {

  document
    .getElementById(field)
    .addEventListener("input", e => {

      const previewId =
        "preview" +
        field.charAt(0).toUpperCase() +
        field.slice(1);

      document.getElementById(previewId)
        .textContent = e.target.value || " ";

    });

});
//================== Theme selection logic===================
document
  .getElementById("theme")
  .addEventListener("change", (e) => {

    const previewCard =
      document.querySelector(".preview-card");

    previewCard.className =
      "preview-card " + e.target.value;

  });

</script>

<!-- Add Enter key navigation between inputs -->
<script>

const inputs = document.querySelectorAll(
  "#cardForm input, #cardForm select"
);
inputs.forEach((input, index) => {

  input.addEventListener("keydown", function(e) {

    if (e.key === "Enter") {

      e.preventDefault();

      const nextInput =
        inputs[index + 1];

      if (nextInput) {
        nextInput.focus();
      }

    }

  });

});

</script>

</body>
</html>
