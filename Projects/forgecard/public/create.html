<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"  

  <title>Create Your Card</title>

  <link rel="stylesheet" href="style.css" />
</head>


<body>

  <div class="create-container">

  <div class="form-panel">

    <h2>Create Your Forgecard</h2>

    <form id="cardForm">

      <input
        type="text"
        id="name"
        placeholder="Full Name"
      >
      <input
        type="text"
        id="title"
        placeholder="Job Title"
      >
      <input
        type="text"
        id="company"
        placeholder="Company"
      >
      <input
        type="email"
        id="email"
        placeholder="Email"
      >
      <input
        type="tel"
        id="phone"
        placeholder="Phone Number"
      >  
      <input
        type="text"
        id="username"
        placeholder="Username"
      />

      <input
        type="url"
        id="website"
        placeholder="Website"
      />

      <select id="theme">

  <option value="dark">
    Dark Theme
  </option>

  <option value="blue">
    Blue Theme
  </option>

</select>    
      <input
      type="file"
      id="photo"
      accept="image/*"
      />

      <button type="submit">
        Generate Card
      </button>

    </form>

  </div>

  <div class="preview-panel">

    <div class="preview-card">

      <h3 id="previewName">
        Your Name
      </h3>

      <p id="previewTitle">
        Job Title
      </p>

      <p id="previewCompany">
        Company Name
      </p>

      <div class="preview-divider"></div>

      <p id="previewEmail">
        your@email.com
      </p>

      <p id="previewPhone">
        (000) 000-0000
      </p>

      <div class="qr-placeholder">
        QR CODE
      </div>

    </div>

  </div>

</div>

  <script type="module" src="app.js"></script>
  <script>

const fields = [
  "name",
  "title",
  "company",
  "email",
  "phone"
];

fields.forEach(field => {

  document
    .getElementById(field)
    .addEventListener("input", e => {
console.log("Generate Card clicked");
      const previewId =
        "preview" +
        field.charAt(0).toUpperCase() +
        field.slice(1);

      document.getElementById(previewId)
        .textContent = e.target.value || " ";

    });

});

</script>
<script>

document
  .getElementById("cardForm")
  .addEventListener("submit", function(e) {

    e.preventDefault();

  });

</script>
<!-- Add Enter key navigation between inputs -->
<script>

const inputs = document.querySelectorAll(
  "#cardForm input"
);

inputs.forEach((input, index) => {

  input.addEventListener("keydown", function(e) {

    if (e.key === "Enter") {

      e.preventDefault();

      const nextInput =
        inputs[index + 1];

      if (nextInput) {
        nextInput.focus();
      }

    }

  });

});

</script>

</body>
</html>
