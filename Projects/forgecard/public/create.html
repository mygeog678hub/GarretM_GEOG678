<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <link
    rel="icon"
    type="image/png"
    href="images/favicon.png"
  />

  <link
    rel="apple-touch-icon"
    href="images/favicon.png"
  />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    ForgeCard | Digital Business Cards with QR Codes
  </title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="create-container">

    <!-- =========================
         FORM PANEL
    ========================== -->

    <div class="form-panel">

      <h2>Create Your Forgecard</h2>

      <form id="cardForm">

        <input
          type="text"
          id="name"
          placeholder="Full Name"
        />

        <input
          type="text"
          id="title"
          placeholder="Job Title"
        />

        <input
          type="text"
          id="company"
          placeholder="Company"
        />

        <input
          type="email"
          id="email"
          placeholder="Email"
        />

        <input
          type="tel"
          id="phone"
          placeholder="Phone Number"
        />

        <!-- SOCIALS -->

        <div class="form-group">

          <label>Facebook URL</label>

          <input
            type="url"
            id="facebook"
            placeholder="https://facebook.com/username"
          />

        </div>

        <div class="form-group">

          <label>Instagram URL</label>

          <input
            type="url"
            id="instagram"
            placeholder="https://instagram.com/username"
          />

        </div>

        <div class="form-group">

          <label>LinkedIn URL</label>

          <input
            type="url"
            id="linkedin"
            placeholder="https://linkedin.com/in/username"
          />

        </div>

        <div class="form-group">

          <label>X / Twitter URL</label>

          <input
            type="url"
            id="twitter"
            placeholder="https://x.com/username"
          />

        </div>

        <input
          type="text"
          id="username"
          placeholder="Social Media Username (e.g. @username)"
        />

        <input
          type="url"
          id="website"
          placeholder="Website"
        />

        <!-- THEME SELECT -->

        <select id="theme">

          <option value="theme-ocean">
            Ocean Blue
          </option>

          <option value="theme-midnight">
            Midnight
          </option>

          <option value="theme-emerald">
            Emerald
          </option>

          <option value="theme-sunset">
            Sunset
          </option>

          <option value="theme-minimal-light">
            Minimal Light
          </option>

          <option value="fbc_pct3">
            Fort Bend PCT3
          </option>

        </select>

        <!-- PHOTO -->

        <input
          type="file"
          id="photo"
          accept="image/*"
        />

        <button type="submit">
          Generate Card
        </button>
        <a
  href="dashboard.html"
  class="btn cancel-btn"
>
  Cancel
</a>

      </form>

    </div>

    <!-- =========================
         PREVIEW PANEL
    ========================== -->

    <div class="preview-panel">

      <div class="preview-card theme-ocean">

        <div id="previewTop"></div>

        <div class="card-info">

          <h3 id="previewName">
            Your Name
          </h3>

          <p id="previewTitle">
            Job Title
          </p>

          <p id="previewCompany">
            Company Name
          </p>

        </div>

        <div class="preview-divider"></div>

        <p id="previewEmail">
          your@email.com
        </p>

        <p id="previewPhone">
          (000) 000-0000
        </p>

        <div class="qr-placeholder">
          QR CODE
        </div>

      </div>

    </div>

  </div>

  <!-- =========================
       APP JS
  ========================== -->

  <script
    type="module"
    src="app.js"
  ></script>

  <!-- =========================
       PREVIEW LOGIC
  ========================== -->

  <script>

    /* =========================
       LIVE TEXT PREVIEW
    ========================== */

    const fields = [
      "name",
      "title",
      "company",
      "email",
      "phone"
    ];

    fields.forEach(field => {

      document
        .getElementById(field)
        .addEventListener("input", e => {

          const previewId =
            "preview" +
            field.charAt(0).toUpperCase() +
            field.slice(1);

          document
            .getElementById(previewId)
            .textContent =
            e.target.value || " ";

        });

    });

    /* =========================
       PREVIEW HEADER
    ========================== */

    const previewTop =
      document.getElementById(
        "previewTop"
      );

    function renderPreviewHeader(theme) {

      if (theme === "fbc_pct3") {

        previewTop.innerHTML = `

          <div class="fbc-header">

            <img
              class="fbc-patch"
              src="/assets/pct3-patch.png"
            >

            <img
              class="fbc-headshot"
              id="previewPhoto"
              src="/assets/default-avatar.png"
            >

            <img
              class="fbc-badge"
              src="/assets/pct3-badge.png"
            >

          </div>

          <div class="fbc-actions">

            <button>
              Vacation Watch
            </button>

            <button>
              Submit Tip
            </button>

            <button>
              Contact Dispatch
            </button>

          </div>

        `;

      } else {

        previewTop.innerHTML = `

          <img
            class="card-avatar"
            id="previewPhoto"
            src="/assets/default-avatar.png"
          >

        `;

      }

    }

    /* =========================
       THEME SWITCHING
    ========================== */

    document
      .getElementById("theme")
      .addEventListener(
        "change",
        (e) => {

          const previewCard =
            document.querySelector(
              ".preview-card"
            );

          previewCard.className =
            "preview-card " +
            e.target.value;

          renderPreviewHeader(
            e.target.value
          );

        }
      );

    /* =========================
       PHOTO PREVIEW
    ========================== */

    document
      .getElementById("photo")
      .addEventListener(
        "change",
        function (e) {

          const file =
            e.target.files[0];

          if (file) {

            const reader =
              new FileReader();

            reader.onload =
              function (event) {

                const previewPhoto =
                  document.getElementById(
                    "previewPhoto"
                  );

                if (previewPhoto) {

                  previewPhoto.src =
                    event.target.result;

                }

              };

            reader.readAsDataURL(
              file
            );

          }

        }
      );

    /* =========================
       INITIAL RENDER
    ========================== */

    renderPreviewHeader(
      "theme-ocean"
    );

  </script>

  <!-- =========================
       ENTER KEY NAVIGATION
  ========================== -->

  <script>

    const inputs =
      document.querySelectorAll(
        "#cardForm input, #cardForm select"
      );

    inputs.forEach((input, index) => {

      input.addEventListener(
        "keydown",
        function (e) {

          if (e.key === "Enter") {

            e.preventDefault();

            const nextInput =
              inputs[index + 1];

            if (nextInput) {

              nextInput.focus();

            }

          }

        }
      );

    });

  </script>

</body>

</html>
