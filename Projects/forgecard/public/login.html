<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    ForgeCard | Digital Business Cards with QR Codes
  </title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="login-container">

    <h1>ForgeCard Login</h1>

    <form id="loginForm">

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      />
<p>
  <a href="#" id="forgotPassword">
    Forgot Password?
  </a>
</p>
      <button type="submit">
        Login
      </button>

    </form>

    <br />

    <button id="signupBtn">
      Create Account
    </button>

  </div>

  <script type="module" src="auth.js"></script>

</body>
</html>
