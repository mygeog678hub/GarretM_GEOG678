<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link
  rel="icon"
  type="image/png"
  href="images/favicon.png"
/>

<link
  rel="apple-touch-icon"
  href="images/favicon.png"
/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>
    ForgeCard | Digital Business Cards with QR Codes
  </title>

  <link rel="stylesheet" href="style.css" />
  
  
</head>

<body>

  <div class="business-card" id="businessCard">
      <div class="fbc-header">

    <img
      class="fbc-patch"
      src="/assets/pct3-patch.png"
      alt="Patch"
    />

    <img
      class="fbc-headshot"
      src="/assets/headshot.jpg"
      alt="Headshot"
    />

    <img
      class="fbc-badge"
      src="/assets/pct3-badge.png"
      alt="Badge"
    />

  </div> 

  <!-- QR Code Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Your JS -->
  <script type="module" src="qr.js"></script>

</body>
</html>
