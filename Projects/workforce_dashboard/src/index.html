/>

  Workforce Operations Platform
</p>

  <!-- ✅ FIXED LABELS -->
  <label for="email">Email</label>
  <input id="email" type="email" placeholder="Enter your email">

  <label for="password">Password</label>
  <input id="password" type="password" placeholder="Enter your password">

  <button onclick="login()">Login</button>
  <button onclick="googleLogin()" class="google-btn">
  Continue with Google
</button>

<p class="reset-link">
  <a href="#" onclick="resetPassword()">
    Forgot Password?
  </a>
</p>
 
  <p id="error" style="color:red;"></p>
</div>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  GoogleAuthProvider,
  signInWithPopup,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkVL4FUIyb7A2XRi1CGmDLf6W_jlJ2VuM",
  authDomain: "workforge-3b77f.firebaseapp.com",
  projectId: "workforge-3b77f",
  storageBucket: "workforge-3b77f.appspot.com",
  messagingSenderId: "906291779450",
  appId: "1:906291779450:web:276a14fed6b25dde2f68c3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, user => {

  document.getElementById("body").style.display = "flex";

  if (user) {

    window.location.href = "app.html";

  }

});

window.login = async function(){
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
  } catch(e){
    error.textContent = e.message;
  }
};

window.googleLogin = async function() {

  try {

    await signInWithPopup(
      auth,
      provider
    );

  } catch(e) {

    error.textContent = e.message;

  }

};

window.resetPassword = async function() {

  if (!email.value) {

    error.textContent =
      "Please enter your email address first.";

    return;

  }

  try {

    await sendPasswordResetEmail(
      auth,
      email.value
    );

    alert(
      "Password reset email sent."
    );

  } catch(e){

    error.textContent = e.message;

  }

};

window.signup = async function(){
  try {
    await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
    alert("User created");
  } catch(e){
    error.textContent = e.message;
  }
};
</script>
