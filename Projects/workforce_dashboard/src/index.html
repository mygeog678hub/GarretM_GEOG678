<!DOCTYPE html>
<html>
<head>
  <title>WorkForge Login</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 360px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #020617;
      border: 1px solid #334155;
      color: white;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5f5;
    }
    .login-logo {
  width: 140px;
  height: auto;
  display: block;
  margin: 0 auto 15px auto;
}
  </style>
</head>

<body style="display:none;" id="body">

<div class="login-container">
  <img
  src="workforge-logo.png"
  alt="WorkForge Logo"
  class="login-logo"
/>
  <p style="margin-top:-10px; color:#94a3b8;">
  Workforce Operations Platform
</p>

  <!-- ✅ FIXED LABELS -->
  <label for="email">Email</label>
  <input id="email" type="email" placeholder="Enter your email">

  <label for="password">Password</label>
  <input id="password" type="password" placeholder="Enter your password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="error" style="color:red;"></p>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkVL4FUIyb7A2XRi1CGmDLf6W_jlJ2VuM",
  authDomain: "workforge-3b77f.firebaseapp.com",
  projectId: "workforge-3b77f",
  storageBucket: "workforge-3b77f.firebasestorage.app",
  messagingSenderId: "906291779450",
  appId: "1:906291779450:web:276a14fed6b25dde2f68c3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {

  document.getElementById("body").style.display = "flex";

  if (user) {

    window.location.href = "app.html";

  }

});

window.login = async function(){
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
  } catch(e){
    error.textContent = e.message;
  }
};

window.signup = async function(){
  try {
    await createUserWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
    alert("User created");
  } catch(e){
    error.textContent = e.message;
  }
};
</script>

</body>
</html>
