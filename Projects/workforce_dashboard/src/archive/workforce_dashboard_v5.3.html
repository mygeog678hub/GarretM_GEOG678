<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workforce Dashboard v5.3</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="style.css">


<style>

<body>

  <div class="brand">

<div style="display:flex; align-items:center; gap:10px;">

<h2>Map View</h2>

<div id="map" style="height:500px;"></div>

<h2>Add Employee</h2>

<h2>Add Site</h2>
<form onsubmit="addSite(); return false;">

<input id="siteCity" placeholder="City">
<select id="siteState">

  <option value="AZ">Arizona (AZ)</option>

  <option value="ID">Idaho (ID)</option>
  <option value="IL">Illinois (IL)</option>
  <option value="IN">Indiana (IN)</option>
  <option value="IA">Iowa (IA)</option>
  <option value="KS">Kansas (KS)</option>
  <option value="KY">Kentucky (KY)</option>
  <option value="LA">Louisiana (LA)</option>
  <option value="ME">Maine (ME)</option>
  <option value="MD">Maryland (MD)</option>
  <option value="MA">Massachusetts (MA)</option>
  <option value="MI">Michigan (MI)</option>
  <option value="MN">Minnesota (MN)</option>

  <option value="MO">Missouri (MO)</option>

<h2>Add Asset (Equipment)</h2>
<form onsubmit="addAsset(); return false;">
  <input id="assetId" placeholder="Asset ID" required>
  <input id="assetType" placeholder="Type" required>
  <button type="submit">Add</button>
</form>

<h2>Add Vehicle</h2>
<form onsubmit="addVehicle(); return false;">
<input id="vehMake" placeholder="Make">
<input id="vehModel" placeholder="Model">
<input id="vehPlate" placeholder="Plate">
<input id="vehUnit" placeholder="Unit">
<button>Add</button>
</form>

<h2>Assign Resources</h2>
<select id="assignEmployee"></select>
<select id="assignSite"></select>
<select id="assignAsset"></select>
<select id="assignVehicle"></select>
<button onclick="assign()">Assign</button>
<!-- <button onclick="exportCSV()">Export CSV</button> -->
<h2>Asset Maintenance</h2>
<select id="maintenanceAssetSelect"></select>
<button onclick="markMaintenance()">Set Maintenance</button>
<button onclick="markActive()">Set Active</button>
<input id="maintenanceLocation" placeholder="Maintenance Location (City, State)">

<h2>Report</h2>
<button onclick="exportExcel()">Export Excel</button>
<table id="reportTable"></table>

<h2>Report Issue</h2>

<form onsubmit="reportIssue(); return false;" style="display:flex; flex-wrap:wrap; gap:10px;">

  <div>
    <label>Module</label><br>
    <select id="bugModule">
      <option value="">Select Module</option>
      <option value="Map">Map</option>
      <option value="Employee">Employee</option>
      <option value="Site">Site</option>
      <option value="Asset">Asset</option>
      <option value="Vehicle">Vehicle</option>
      <option value="Assignments">Assignments</option>
      <option value="Reports">Reports</option>
    </select>
  </div>

  <div>
    <label>Description</label><br>
    <input id="bugDescription" placeholder="Describe the issue">
  </div>

  <div>
    <label>Your Email</label><br>
    <input id="bugEmail" placeholder="name@email.com">
  </div>

  <div>
    <label>Severity</label><br>
    <select id="bugSeverity">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
  </div>

  <div style="align-self:end;">
    <button type="submit">Submit</button>
  </div>

</form>

<script>

// DATA
let employees=[], sites=[], assets=[], vehicles=[], assignments=[];
let markers = {};
let malfunctions = [];


// MAP
let map = L.map('map').setView([29.7604,-95.3698],10);

// 🗺️ OpenStreetMap (original)
const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution: '&copy; OpenStreetMap contributors'
  }
);

// 🌫️ Light canvas
const lightMap = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; OpenStreetMap &copy; CartoDB'
  }
);

// 🌙 Dark map
const darkMap = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; OpenStreetMap &copy; CartoDB'
  }
);

// 🔥 Set default map (OSM)
osm.addTo(map);

// 🎛️ Layer switcher
const baseMaps = {
  "Street Map": osm,
  "Light Canvas": lightMap,
  "Dark Mode": darkMap
};

L.control.layers(baseMaps).addTo(map);

const homeControl = L.control({ position: 'topleft' });

homeControl.onAdd = function () {
  const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control');

  div.innerHTML = '<button style="padding:5px;">🏠</button>';

  div.onclick = function () {
    map.setView([29.7604, -95.3698], 10); // Houston
  };

  return div;
};

homeControl.addTo(map);

// ICONS
const greenIcon = new L.Icon({iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',iconSize:[25,41],iconAnchor:[12,41]});
const redIcon = new L.Icon({iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',iconSize:[25,41],iconAnchor:[12,41]});
const greyIcon = new L.Icon({iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-grey.png',shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',iconSize:[25,41],iconAnchor:[12,41]});

// GEOCODE
async function geocode(city,state){
 const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city},${state}`);
 const d=await res.json();
 if(!d.length) return null;
 return {lat:+d[0].lat,lng:+d[0].lon};
}

// EMPLOYEE
function addEmployee(){
 if(!empName.value) return;
 employees.push({id:"EMP-"+(employees.length+1),name:empName.value,designation:empRole.value});
 empName.value="";
 refresh();
}

// SITE
async function addSite(){

  const name = siteName.value.trim();
  const city = siteCity.value.trim();
  const state = siteState.value.trim().toUpperCase();

  if(!name || !city || !state){
    alert("Please fill out Site Name, City, and State");
    return;
  }

  // 🔥 VALID STATE CHECK (US states only)
  const validStates = [
    "AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA",
    "HI","ID","IL","IN","IA","KS","KY","LA","ME","MD",
    "MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ",
    "NM","NY","NC","ND","OH","OK","OR","PA","RI","SC",
    "SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"
  ];

  if (!validStates.includes(state)) {
    alert("Invalid state abbreviation (use TX, CA, NY, etc.)");
    return;
  }

  // 🔥 Geocode
  const coords = await geocode(city, state);

  // 🔥 STRICT VALIDATION
  if(!coords || !coords.lat || !coords.lng){
    alert("Location not found. Check city/state format.");
    return;
  }

  // 🔥 OPTIONAL: block weird far-away results
  if (coords.lat < 20 || coords.lat > 50 || coords.lng > -60 || coords.lng < -130) {
    alert("Location looks invalid for US. Please check input.");
    return;
  }

  const site = {
    id: "SITE-" + Date.now(),
    name,
    city,
    state,
    lat: coords.lat,
    lng: coords.lng
  };

  sites.push(site);

  const marker = L.marker([coords.lat, coords.lng]).addTo(map);
  markers[site.id] = marker;

  siteName.value = "";
  siteCity.value = "";
  siteState.value = "";
  siteName.focus();

  refresh();
}
// DELETE SITE (BONUS)
function deleteSite(siteId){
  const index = sites.findIndex(s => s.id === siteId);
  if (index === -1) return;

  // remove marker from map
  if (markers[siteId]) {
    map.removeLayer(markers[siteId]);
    delete markers[siteId];
  }

  // remove site from array
  sites.splice(index, 1);

  refresh();
}
// ASSET
function addAsset() {
  const idInput = document.getElementById("assetId");
  const typeInput = document.getElementById("assetType");

  const id = idInput.value.trim();
  const type = typeInput.value.trim();

  // Prevent empty input
  if (!id || !type) {
    alert("Please enter both Asset ID and Type");
    return;
  }

  // Prevent duplicates (use assets[], NOT state.assets)
  const exists = assets.some(a => 
    a.id.toLowerCase() === id.toLowerCase()
  );

  if (exists) {
    alert("Asset already exists");
    idInput.value = "";
    idInput.focus();
    return;
  }

  // Add asset
  const newAsset = {
  id,
  type,
  assignedTo: null,
  status: "active" // "active" | "maintenance"
};

  assets.push(newAsset);

  console.log("Asset added:", newAsset);

  // Clear inputs + reset cursor
  idInput.value = "";
  typeInput.value = "";
  idInput.focus();

  // Refresh UI (important)
  refresh();

  updateMaintenanceDropdown();

  if (typeof updateAssetDropdown === "function") {
    updateAssetDropdown();
  }
}
function updateMaintenanceDropdown() {
  const dropdown = document.getElementById("maintenanceAssetSelect");
  if (!dropdown) return;

  dropdown.innerHTML = '<option value="">Select Asset</option>';

  assets.forEach(asset => {
    let label = `${asset.id} (${asset.type}) - ${asset.status}`;

    if (asset.status === "maintenance") {
      label += ` @ ${asset.maintenanceLocation || "Unknown"}`;
    }

    const option = document.createElement("option");
    option.value = asset.id;
    option.textContent = label;
    dropdown.appendChild(option);
  });
}

function markMaintenance() {
  const id = document.getElementById("maintenanceAssetSelect").value;
  const location = document.getElementById("maintenanceLocation").value || "Unknown";

  if (!id) {
    alert("Select an asset");
    return;
  }

  const asset = assets.find(a => a.id === id);
  if (!asset) return;

  asset.status = "maintenance";
  asset.maintenanceLocation = location;
  asset.maintenanceDate = new Date().toISOString(); // 🔥 ADD THIS

  refresh();
}

function markActive() {
  const id = document.getElementById("maintenanceAssetSelect").value;

  if (!id) {
    alert("Select an asset");
    return;
  }

  const asset = assets.find(a => a.id === id);
  if (!asset) return;

  asset.status = "active";
  asset.maintenanceLocation = "";

  refresh();
}
// VEHICLE
function addVehicle(){
 vehicles.push({id:"VEH-"+(vehicles.length+1),make:vehMake.value,model:vehModel.value,plate:vehPlate.value,unit:vehUnit.value});
 vehMake.value=vehModel.value=vehPlate.value=vehUnit.value="";
 vehMake.focus();
 refresh();
}

// ASSIGN
function assign(){

  // 🚫 Prevent double assignment of employee
  const existing = assignments.find(a => 
    a.employeeId === assignEmployee.value && !a.endTime
  );

  if (existing) {
    alert("This employee is already assigned to a site. Unassign them first.");
    return;
  }

  // 🚫 Prevent assigning maintenance assets
  const selectedAssetId = assignAsset.value || null;

  const asset = assets.find(x => x.id === selectedAssetId);

  if (asset && asset.status === "maintenance") {
    alert("This asset is currently under maintenance and cannot be assigned.");
    return;
  }

  assignments.push({
    employeeId: assignEmployee.value,
    siteId: assignSite.value,
    assetId: selectedAssetId,
    vehicleId: assignVehicle.value || null,
    startTime: new Date().toISOString(),
    endTime: null
  });

  refresh();
}

// UNASSIGN
function unassign(empId){
 const a=assignments.find(x=>x.employeeId===empId && !x.endTime);
 if(a) a.endTime=new Date().toISOString();
 refresh();
}

// RENDER
function render() {
  let rows = [];

  // 🔹 ASSIGNMENT ROWS
  assignments.forEach(a => {
    const emp = employees.find(e => e.id === a.employeeId);
    const site = sites.find(s => s.id === a.siteId);
    const vehicle = vehicles.find(v => v.id === a.vehicleId);
    const asset = assets.find(x => x.id === a.assetId);

    const status = a.endTime ? "Completed" : "Active";

    let assetLabel = "";
    if (asset) {
      assetLabel = `${asset.id} (${asset.type})`;

      if (asset.status === "maintenance") {
        assetLabel += ` [MAINTENANCE @ ${asset.maintenanceLocation || "Unknown"}]`;
      }
    }

    rows.push({
      employeeId: emp ? emp.id : "",
      start: a.startTime ? new Date(a.startTime).toLocaleString() : "",
      end: a.endTime ? new Date(a.endTime).toLocaleString() : "",
      site: site ? site.name : "",
      employee: emp ? emp.name : "",
      designation: emp ? emp.designation : "",
      asset: assetLabel,
      vehicle: vehicle ? `${vehicle.make} ${vehicle.model}` : "",
      status

      
    });
  });

  malfunctions.forEach(m => {
  const asset = assets.find(a => a.id === m.assetId);

  rows.push({
    employeeId: "",
    start: new Date(m.date).toLocaleString(),
    end: "",
    site: "Malfunction Report",
    employee: "",
    designation: "",
    asset: asset
      ? `${asset.id} (${asset.type}) [ISSUE: ${m.description}]`
      : m.assetId,
    vehicle: "",
    status: "Malfunction"
  });
});

  // 🔥 MAINTENANCE ROWS (NEW)
  assets.forEach(asset => {
    if (asset.status === "maintenance") {
      rows.push({
        employeeId: "",
        start: asset.maintenanceDate
          ? new Date(asset.maintenanceDate).toLocaleString()
          : "",
        end: "",
        site: asset.maintenanceLocation || "Maintenance",
        employee: "",
        designation: "",
        asset: `${asset.id} (${asset.type}) [MAINTENANCE]`,
        vehicle: "",
        status: "Maintenance"
      });
    }
  });

  // 🔹 RENDER TABLE
  document.getElementById("reportTable").innerHTML = `
    <tr>
      <th>Start</th>
      <th>End</th>
      <th>Site</th>
      <th>Employee</th>
      <th>Designation</th>
      <th>Asset</th>
      <th>Vehicle</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    ${rows.map(r => `
      <tr>
        <td>${r.start}</td>
        <td>${r.end}</td>
        <td>${r.site}</td>
        <td>${r.employee}</td>
        <td>${r.designation}</td>
        <td>${r.asset}</td>
        <td>${r.vehicle}</td>
        <td>${r.status}</td>
        <td>
          ${r.status === "Active"
            ? `<button onclick="unassign('${r.employeeId}')">Unassign</button>`
            : ""
          }
        </td>
      </tr>
    `).join("")}
  `;

  updateMap();

  return rows; // 🔥 REQUIRED for Excel
}

// MAP UPDATE
function updateMap(){

  sites.forEach(site => {

    const marker = markers[site.id];

    // Active assignments for this site
    const active = assignments.filter(a =>
      a.siteId === site.id && !a.endTime
    );

    // Determine marker color
    let icon = greyIcon;
    if(active.length) icon = greenIcon;

    marker.setIcon(icon);

    // Build popup content
    let popup = `<b>${site.name}</b><br>${site.city}, ${site.state}<br><br>`;

    if(!active.length){
      popup += "No active assignments";
    } else {

      popup += "<b>Employees:</b><br>";
      active.forEach(a => {
        const emp = employees.find(e => e.id === a.employeeId);
        popup += `- ${emp?.name || ""}<br>`;
      });

      popup += "<br><b>Equipment:</b><br>";
      active.forEach(a => {
        const asset = assets.find(x => x.id === a.assetId);
        if(asset){
          popup += `- ${asset.id} (${asset.type})<br>`;
        }
      });

      popup += "<br><b>Vehicles:</b><br>";
      active.forEach(a => {
        const v = vehicles.find(x => x.id === a.vehicleId);
        if(v){
          popup += `- ${v.make} ${v.model} (${v.plate || v.unit || ""})<br>`;
        }
      });
    }

    marker.bindPopup(popup);
  });
}
  // 🔥 Remove site from array
  
  function deleteSite(siteId){

  // remove marker
  if (markers[siteId]) {
    map.removeLayer(markers[siteId]);
    delete markers[siteId];
  }

  // remove site
  sites = sites.filter(s => s.id !== siteId);

  // remove assignments
  assignments = assignments.filter(a => a.siteId !== siteId);

  refresh();
}

// EXCEL
function exportExcel(){
 const data=render();
 const ws=XLSX.utils.json_to_sheet(data);
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Report");
 XLSX.writeFile(wb,"workforce_final.xlsx");
}

function refresh(){
  const assignEmployee = document.getElementById("assignEmployee");
  const assignSite = document.getElementById("assignSite");
  const assignAsset = document.getElementById("assignAsset");
  const assignVehicle = document.getElementById("assignVehicle");

  if (!assignEmployee || !assignSite || !assignAsset || !assignVehicle) {
    console.warn("Dropdowns not ready");
    return;
  }

  assignEmployee.innerHTML = employees.map(e =>
    `<option value="${e.id}">${e.name}</option>`
  ).join('');

  assignSite.innerHTML = sites.map(s =>
    `<option value="${s.id}">${s.name}</option>`
  ).join('');

  assignAsset.innerHTML =
    `<option value="">None</option>` +
    assets.map(a =>
      `<option value="${a.id}">${a.id}</option>`
    ).join('');

  assignVehicle.innerHTML =
    `<option value="">None</option>` +
    vehicles.map(v =>
      `<option value="${v.id}">${v.make} ${v.model}</option>`
    ).join('');

  updateMaintenanceDropdown();
  const malAssetSelect = document.getElementById("malAsset");

if (malAssetSelect) {
  malAssetSelect.innerHTML =
    `<option value="">Select Asset</option>` +
    assets.map(a =>
      `<option value="${a.id}">${a.id} (${a.type})</option>`
    ).join('');
}
  render();
}  

let issues = [];

function reportIssue() {
  const module = document.getElementById("bugModule").value;
  const description = document.getElementById("bugDescription").value.trim();
  const email = document.getElementById("bugEmail").value.trim();
  const severity = document.getElementById("bugSeverity").value;

  if (!module || !description || !email) {
    alert("Please complete all fields");
    return;
  }

  issues.push({
    module,
    description,
    email,
    severity,
    date: new Date().toISOString()
  });

  // Clear inputs
  document.getElementById("bugDescription").value = "";
  document.getElementById("bugEmail").value = "";

  alert("Issue submitted successfully");

  console.log("Issues:", issues);
}

refresh();
setTimeout(()=>map.invalidateSize(),300);

</script>
