<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact WorkForge</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="top-nav">
    <a href="index.html">Login</a>
    <a href="about.html">About</a>
    <a href="features.html">Features</a>
  </nav>

  <div class="page-container">

    <h1>Contact WorkForge</h1>

    <p>
      Interested in WorkForge for your organization?
      Send us a message below.
    </p>

    <form
      name="contact"
      method="POST"
      data-netlify="true"
      class="contact-form"
    >

      <input type="hidden" name="form-name" value="contact">

      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
      >

      <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
      >

      <input
        type="text"
        name="company"
        placeholder="Company Name"
      >

      <textarea
        name="message"
        rows="6"
        placeholder="Tell us about your operational needs..."
        required
      ></textarea>

      <button type="submit">
        Send Message
      </button>

    </form>

  </div>

</body>

</html>
